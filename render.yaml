services:
  # 1. Background worker service
  - type: worker
    name: async-worker
    env: node
    buildCommand: npm install
    startCommand: node worker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: async-db
          property: connectionString

  # 2. Main API Web Service
  - type: web
    name: async-api
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: async-db
          property: connectionString

databases:
  # 3. PostgreSQL Database
  - name: async-db
    databaseName: asynctasks
    user: asyncuser
